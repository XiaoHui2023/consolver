name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-ubuntu16:
    name: Linux (Ubuntu 16.04, PyInstaller)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pack in Ubuntu 16.04 (docker)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/work" -w /work \
            ubuntu:16.04 \
            bash tools/ci_pack_ubuntu16.sh

      - name: Fix dist permissions
        run: sudo chown -R "$(id -u):$(id -g)" dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: consolver-linux-ubuntu16
          path: |
            dist/consolver
            dist/consolver-*.tar.gz
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    needs:
      - build-linux-ubuntu16
    if: always() && needs.build-linux-ubuntu16.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: ver
        shell: bash
        run: |
          VERSION=$(python -c "import re; t=open('pyproject.toml', encoding='utf-8').read(); m=re.search(r'(?m)^version\s*=\s*[\"\\']([^\"\\']+)[\"\\']', t); print(m.group(1) if m else '')")
          if [ -z "$VERSION" ]; then
            echo "version not found in pyproject.toml" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: consolver-linux-ubuntu16
          path: release-assets

      - name: Point release tag at this commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa "${{ steps.ver.outputs.tag }}" -m "Release ${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}" --force

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Release ${{ steps.ver.outputs.tag }}
          body: |
            Rolling release: Ubuntu 16.04 PyInstaller build from the main commit that triggered this workflow.
            Version matches pyproject.toml and archive filenames.
          generate_release_notes: false
          files: release-assets/**
          fail_on_unmatched_files: true
